kind = "web"
previewPath = "/"
title = "Hardware Inventory Pro"
version = "1.0.0"
id = "artifacts/hardware-inventory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23291

[services.development]
run = "pnpm --filter @workspace/hardware-inventory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hardware-inventory", "run", "build" ]
publicDir = "artifacts/hardware-inventory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23291"
BASE_PATH = "/"
